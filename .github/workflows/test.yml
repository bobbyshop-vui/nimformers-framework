name: Build & Test (CPU + GPGPU-Sim)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  # ─────────────────────────────────────────────────────────────
  # macOS (Intel + Apple Silicon) — Metal + CPU
  # ─────────────────────────────────────────────────────────────
  macos:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            name: macOS (Apple Silicon / arm64)
          - os: macos-15-intel
            name: macOS (Intel / x86_64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show architecture
        run: |
          echo "uname -m: $(uname -m)"
          sw_vers || true

      - name: Install Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept || true

      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Verify Metal compiler
        run: metal -version || echo "metal not found"

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Show Nim version
        run: nim --version

      - name: Build
        run: make build

      - name: Test with Metal
        run: make run-metal

      - name: Test with CPU
        run: make run-cpu

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nimcache-${{ matrix.os }}
          path: |
            nimcache/
            *.log
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # Linux (Ubuntu) — CPU only (không có GPU)
  # ─────────────────────────────────────────────────────────────
  linux:
    name: Linux (Ubuntu) CPU
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential gcc g++ make

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Build CPU backend
        run: make build

      - name: Test with CPU
        run: make run-cpu

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nimcache-linux
          path: |
            nimcache/
            *.log
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # Windows — CPU only (không có GPU)
  # ─────────────────────────────────────────────────────────────
  windows:
    name: Windows CPU
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Build CPU backend
        run: |
          make build
          make run-cpu

      - name: Test with CPU
        run: ./test_nimformer.exe

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nimcache-windows
          path: |
            nimcache/
            *.log
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # GPGPU-Sim — mô phỏng CUDA trên CPU (chậm, dùng để test)
  # ─────────────────────────────────────────────────────────────
  gpgpu-sim:
    name: GPGPU-Sim (CUDA simulation on CPU)
    runs-on: ubuntu-22.04
    continue-on-error: true
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential gcc g++ make cmake git
          sudo apt-get install -y libc6-dev-i386 libc6-dev
  
      - name: Install CUDA Toolkit (cần cho compile kernel)
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/11.8.0/local_installers/cuda_11.8.0_520.61.05_linux.run
          chmod +x cuda_11.8.0_520.61.05_linux.run
          sudo ./cuda_11.8.0_520.61.05_linux.run --toolkit --silent --override
          echo "export PATH=/usr/local/cuda-11.8/bin:$PATH" >> $GITHUB_ENV
          echo "export LD_LIBRARY_PATH=/usr/local/cuda-11.8/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV
  
      - name: Check CUDA
        run: |
          /usr/local/cuda-11.8/bin/nvcc --version || echo "CUDA not found"
  
      - name: Clone and build GPGPU-Sim
        run: |
          git clone --depth 1 https://github.com/gpgpu-sim/gpgpu-sim_distribution.git
          cd gpgpu-sim_distribution
          make setup
          source setup_environment
  
      - name: Set GPGPU-Sim environment
        run: |
          echo "source $(pwd)/gpgpu-sim_distribution/setup_environment" >> $GITHUB_ENV
  
      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'
  
      - name: Build CUDA kernel
        run: |
          source gpgpu-sim_distribution/setup_environment
          make cuda-lib
  
      - name: Build Nim with GPGPU-Sim
        run: |
          source gpgpu-sim_distribution/setup_environment
          nim c -d:release -d:withCuda -d:backend=cuda \
            --passL:"-L. -lcudakernels -lcudart -lcublas" \
            test_nimformer.nim
  
      - name: Test with GPGPU-Sim
        run: |
          source gpgpu-sim_distribution/setup_environment
          ./test_nimformer || echo "GPGPU-Sim test may fail on CI"
